name: media_streamer
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  bonsoir: ^6.0.2
  flutter:
    sdk: flutter
  intl: ^0.20.2
  video_player: ^2.9.3
  network_info_plus: ^7.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  shelf: ^1.4.2
  shelf_static: ^1.1.3
  receive_sharing_intent: ^1.8.1
  share_plus: ^10.1.4
  sqflite: ^2.4.2
  flutter_local_notifications: ^19.0.0
  youtube_explode_dart: ^3.0.5
  http: ^1.3.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
